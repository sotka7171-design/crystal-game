<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💎 Кристальный Кликер</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0d0a1a;
  color: #fff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

h1 { color: #f0c040; font-size: 2rem; margin: 10px 0 4px; text-align:center; }
.sub { color: #9070e0; font-size: 0.85rem; margin-bottom: 16px; }

/* СЧЁТ */
.score-box {
  background: #1a1430;
  border: 2px solid #2d2060;
  border-radius: 14px;
  padding: 14px 30px;
  text-align: center;
  margin-bottom: 16px;
  width: 100%;
  max-width: 420px;
}
.score-big { font-size: 2.2rem; font-weight: bold; color: #f0c040; }
.score-row { display:flex; justify-content:center; gap:30px; margin-top:8px; }
.score-item { text-align:center; }
.score-item span { display:block; }
.score-item .lbl { font-size:0.65rem; color:#7060a0; text-transform:uppercase; }
.score-item .val { font-size:1rem; color:#b090ff; font-weight:bold; }

/* КРИСТАЛЛ */
#gem {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 32%, #d0a0ff, #6030c0 50%, #200a60);
  border: 3px solid #9060e0;
  box-shadow: 0 0 40px rgba(120,60,220,0.6);
  font-size: 4rem;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  user-select: none;
  transition: transform 0.08s;
  margin-bottom: 14px;
  -webkit-tap-highlight-color: transparent;
}
#gem:active { transform: scale(0.88); }

/* КНОПКА РЕКЛАМЫ */
#btnAd {
  background: #1a1040;
  border: 2px solid #9060e0;
  border-radius: 10px;
  color: #b090ff;
  padding: 10px 24px;
  font-size: 0.88rem;
  cursor: pointer;
  margin-bottom: 16px;
  width: 100%; max-width: 420px;
  transition: all 0.2s;
}
#btnAd:hover:not(:disabled) { background:#2a1a60; border-color:#f0c040; color:#f0c040; }
#btnAd:disabled { opacity:0.35; cursor:not-allowed; }

/* МАГАЗИН */
.shop { width:100%; max-width:420px; }
.shop h2 { color:#f0c040; font-size:1rem; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.1em; }

.card {
  background: #1a1430;
  border: 2px solid #2d2060;
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.card:hover { border-color: #9060e0; background: #201840; }
.card:active { background: #2a1e50; transform: scale(0.98); }
.card.locked { opacity: 0.38; cursor: not-allowed; }

.card-icon { font-size: 2rem; flex-shrink:0; }
.card-info { flex:1; }
.card-name { font-weight: bold; font-size: 0.95rem; color:#d4c0ff; }
.card-desc { font-size: 0.72rem; color: #7060a0; margin-top:2px; }
.card-right { text-align:right; flex-shrink:0; }
.card-cost { color:#f0c040; font-weight:bold; font-size:0.9rem; }
.card-cost.ok { color:#60e080; }
.card-eff { color:#60e080; font-size:0.72rem; margin-top:2px; }
.card-count { color:#9060e0; font-size:0.78rem; }

/* ДОСТИЖЕНИЯ */
.achi { width:100%; max-width:420px; margin-top:12px; }
.achi h2 { color:#f0c040; font-size:1rem; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.1em; }
.achi-list { display:flex; flex-wrap:wrap; gap:6px; }
.badge { padding:4px 10px; border-radius:20px; font-size:0.72rem; border:1px solid; }
.badge.no  { border-color:#2d2060; color:#3d3070; }
.badge.yes { border-color:#c89820; color:#f0c040; background:rgba(240,192,64,0.08); }

/* РЕКЛАМНЫЙ ОВЕРЛЕЙ */
#adOverlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,0.93);
  z-index:999;
  align-items:center; justify-content:center; flex-direction:column; gap:20px;
}
#adOverlay.on { display:flex; }
.ad-box {
  background:#111; border:2px solid #9060e0; border-radius:14px;
  width:min(400px,88vw); padding:40px 20px;
  display:flex; flex-direction:column; align-items:center; gap:16px;
  text-align:center;
}
.ad-box .big { font-size:3rem; }
.ad-box .lbl { color:#9060e0; font-size:1.1rem; font-weight:bold; }
.ad-sec { font-size:3rem; font-weight:900; color:#f0c040; }
.ad-hint { color:#605080; font-size:0.8rem; }
#btnClaim {
  display:none;
  background:#40c060; border:none; border-radius:10px;
  color:#062010; font-size:1rem; font-weight:bold;
  padding:12px 32px; cursor:pointer;
}
#btnClaim.on { display:block; }

/* ТОСТ */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#1a1430; border:1px solid #9060e0; color:#b090ff;
  padding:9px 22px; border-radius:30px; font-size:0.88rem;
  z-index:2000; pointer-events:none; white-space:nowrap;
  animation: tin 0.3s ease, tout 0.4s ease 1.8s forwards;
}
@keyframes tin  { from{opacity:0;transform:translateX(-50%) translateY(10px)} }
@keyframes tout { to  {opacity:0;transform:translateX(-50%) translateY(10px)} }

/* ПЛАВАЮЩИЙ ТЕКСТ */
.pop {
  position:fixed; pointer-events:none;
  font-size:1.1rem; font-weight:bold; color:#f0c040;
  animation: popUp 0.9s ease-out forwards; z-index:900;
}
@keyframes popUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }
</style>
</head>
<body>

<h1>💎 Кристальный Кликер</h1>
<p class="sub">Нажимай — зарабатывай — улучшай</p>

<!-- СЧЁТ -->
<div class="score-box">
  <div class="score-big" id="scoreMain">0 💎</div>
  <div class="score-row">
    <div class="score-item">
      <span class="lbl">за клик</span>
      <span class="val" id="scoreClick">1</span>
    </div>
    <div class="score-item">
      <span class="lbl">в секунду</span>
      <span class="val" id="scoreSec">0</span>
    </div>
    <div class="score-item">
      <span class="lbl">всего</span>
      <span class="val" id="scoreTotal">0</span>
    </div>
  </div>
</div>

<!-- КРИСТАЛЛ -->
<div id="gem">💎</div>

<!-- КНОПКА РЕКЛАМЫ -->
<button id="btnAd">📺 Реклама → +500 💎</button>

<!-- МАГАЗИН -->
<div class="shop">
  <h2>🛒 Магазин</h2>
  <div id="shopList"></div>
</div>

<!-- ДОСТИЖЕНИЯ -->
<div class="achi">
  <h2>🏆 Достижения</h2>
  <div class="achi-list" id="achiList"></div>
</div>

<!-- РЕКЛАМНЫЙ ОВЕРЛЕЙ -->
<div id="adOverlay">
  <div class="ad-box">
    <div class="big">📺</div>
    <div class="lbl">РЕКЛАМА</div>
    <div class="ad-sec" id="adSec">5</div>
    <div class="ad-hint">Досмотри до конца для получения награды</div>
  </div>
  <button id="btnClaim" onclick="claimAd()">✅ Получить +500 💎</button>
</div>

<script>
// ── ДАННЫЕ ──────────────────────────────────────────────────
var g = {
  gems: 0,
  total: 0,
  perClick: 1,
  perSec: 0,
  upg: [0, 0, 0, 0, 0, 0]
};

var ITEMS = [
  { icon:'⛏️', name:'Кирка',          desc:'Добавляет +1 за клик',             price:10,   cpc:1,  cps:0,  mult:1.4 },
  { icon:'🔮', name:'Магический шар', desc:'Добавляет +1 в секунду',           price:50,   cpc:0,  cps:1,  mult:1.5 },
  { icon:'🐉', name:'Дракон',         desc:'Добавляет +5 за клик',             price:200,  cpc:5,  cps:0,  mult:1.6 },
  { icon:'🏰', name:'Замок',          desc:'Добавляет +5 в секунду',           price:500,  cpc:0,  cps:5,  mult:1.7 },
  { icon:'✨', name:'Волшебник',      desc:'Добавляет +20 за клик, +2 в сек', price:2000, cpc:20, cps:2,  mult:1.8 },
  { icon:'🌌', name:'Портал',         desc:'Добавляет +30 в секунду',          price:8000, cpc:0,  cps:30, mult:2.0 }
];

var ACHIS = [
  { id:'a1', lbl:'Первый клик',   ok: function(){ return g.total >= 1; } },
  { id:'a2', lbl:'100 кристаллов',ok: function(){ return g.total >= 100; } },
  { id:'a3', lbl:'1 000',         ok: function(){ return g.total >= 1000; } },
  { id:'a4', lbl:'10 000',        ok: function(){ return g.total >= 10000; } },
  { id:'a5', lbl:'100 000',       ok: function(){ return g.total >= 100000; } },
  { id:'a6', lbl:'1-й апгрейд',  ok: function(){ return g.upg.some(function(n){ return n>0; }); } },
  { id:'a7', lbl:'10 апгрейдов', ok: function(){ return g.upg.reduce(function(a,b){ return a+b; },0)>=10; } },
  { id:'a8', lbl:'10/сек',       ok: function(){ return g.perSec>=10; } }
];

var done = {};

// Загрузка сохранения
try {
  var sv = localStorage.getItem('gst');
  if (sv) { var tmp = JSON.parse(sv); g.gems=tmp.gems||0; g.total=tmp.total||0; g.upg=tmp.upg||[0,0,0,0,0,0]; }
  var sv2 = localStorage.getItem('gachi');
  if (sv2) done = JSON.parse(sv2);
} catch(e) {}

// ── УТИЛИТЫ ─────────────────────────────────────────────────
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n;
}

function price(i) {
  return Math.floor(ITEMS[i].price * Math.pow(ITEMS[i].mult, g.upg[i]));
}

function recalc() {
  g.perClick = 1;
  g.perSec = 0;
  for (var i = 0; i < ITEMS.length; i++) {
    g.perClick += ITEMS[i].cpc * g.upg[i];
    g.perSec   += ITEMS[i].cps * g.upg[i];
  }
}

function save() {
  localStorage.setItem('gst', JSON.stringify({ gems: Math.floor(g.gems), total: Math.floor(g.total), upg: g.upg }));
  localStorage.setItem('gachi', JSON.stringify(done));
}

// ── РЕНДЕР ──────────────────────────────────────────────────
function draw() {
  document.getElementById('scoreMain').textContent  = fmt(g.gems) + ' 💎';
  document.getElementById('scoreClick').textContent = fmt(g.perClick);
  document.getElementById('scoreSec').textContent   = fmt(g.perSec);
  document.getElementById('scoreTotal').textContent = fmt(g.total);
  drawShop();
  drawAchi();
}

function drawShop() {
  var list = document.getElementById('shopList');
  list.innerHTML = '';
  for (var i = 0; i < ITEMS.length; i++) {
    (function(idx) {
      var it = ITEMS[idx];
      var p  = price(idx);
      var can = g.gems >= p;

      var card = document.createElement('div');
      card.className = 'card' + (can ? '' : ' locked');

      var eff = '';
      if (it.cpc) eff += '+' + it.cpc + '/клик ';
      if (it.cps) eff += '+' + it.cps + '/сек';

      card.innerHTML =
        '<div class="card-icon">' + it.icon + '</div>' +
        '<div class="card-info">' +
          '<div class="card-name">' + it.name + '</div>' +
          '<div class="card-desc">' + it.desc + '</div>' +
        '</div>' +
        '<div class="card-right">' +
          '<div class="card-cost' + (can ? ' ok' : '') + '">💎 ' + fmt(p) + '</div>' +
          '<div class="card-eff">' + eff + '</div>' +
          '<div class="card-count">×' + g.upg[idx] + '</div>' +
        '</div>';

      card.onclick = function() {
        var cost = price(idx);
        if (g.gems < cost) { toast('❌ Мало кристаллов!'); return; }
        g.gems -= cost;
        g.upg[idx]++;
        recalc();
        draw();
        save();
        toast(it.icon + ' ' + it.name + ' куплена!');
      };

      list.appendChild(card);
    })(i);
  }
}

function drawAchi() {
  var list = document.getElementById('achiList');
  list.innerHTML = '';
  var newOne = false;
  for (var i = 0; i < ACHIS.length; i++) {
    var a = ACHIS[i];
    if (!done[a.id] && a.ok()) { done[a.id] = true; newOne = true; toast('🏆 ' + a.lbl); }
    var b = document.createElement('div');
    b.className = 'badge ' + (done[a.id] ? 'yes' : 'no');
    b.textContent = (done[a.id] ? '✓ ' : '🔒 ') + a.lbl;
    list.appendChild(b);
  }
  if (newOne) save();
}

// ── КЛИК ────────────────────────────────────────────────────
document.getElementById('gem').onclick = function(e) {
  g.gems  += g.perClick;
  g.total += g.perClick;
  draw();

  var pop = document.createElement('div');
  pop.className = 'pop';
  pop.textContent = '+' + fmt(g.perClick);
  pop.style.left = (e.clientX - 20) + 'px';
  pop.style.top  = (e.clientY - 30) + 'px';
  document.body.appendChild(pop);
  pop.addEventListener('animationend', function(){ pop.remove(); });
};

// ── ПАССИВНЫЙ ДОХОД ──────────────────────────────────────────
setInterval(function() {
  if (g.perSec > 0) {
    g.gems  += g.perSec / 20;
    g.total += g.perSec / 20;
    document.getElementById('scoreMain').textContent  = fmt(g.gems) + ' 💎';
    document.getElementById('scoreTotal').textContent = fmt(g.total);
    drawAchi();
  }
}, 50);

// Автосохранение
setInterval(function() { save(); }, 5000);

// ── РЕКЛАМА ─────────────────────────────────────────────────
var adBusy = false;
var adTimer = null;

document.getElementById('btnAd').onclick = function() {
  if (adBusy) return;
  adBusy = true;

  // Открыть оверлей
  document.getElementById('adOverlay').className = 'on';
  document.getElementById('btnClaim').className  = '';
  var sec = 5;
  document.getElementById('adSec').textContent = sec;

  adTimer = setInterval(function() {
    sec--;
    document.getElementById('adSec').textContent = sec > 0 ? sec : '✓';
    if (sec <= 0) {
      clearInterval(adTimer);
      document.getElementById('btnClaim').className = 'on';
    }
  }, 1000);
};

function claimAd() {
  document.getElementById('adOverlay').className = '';
  g.gems  += 500;
  g.total += 500;
  draw();
  save();
  toast('🎁 +500 💎 получено!');

  // Перезарядка 30 секунд
  var btn = document.getElementById('btnAd');
  btn.disabled = true;
  var cd = 30;
  btn.textContent = '⏳ Ещё ' + cd + ' сек';
  var cdTimer = setInterval(function() {
    cd--;
    btn.textContent = '⏳ Ещё ' + cd + ' сек';
    if (cd <= 0) {
      clearInterval(cdTimer);
      adBusy = false;
      btn.disabled = false;
      btn.textContent = '📺 Реклама → +500 💎';
    }
  }, 1000);
}

// ── ТОСТ ─────────────────────────────────────────────────────
var toastTimer;
function toast(msg) {
  var old = document.querySelector('.toast');
  if (old) old.remove();
  clearTimeout(toastTimer);
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  toastTimer = setTimeout(function() { if (t.parentNode) t.remove(); }, 2300);
}

// ── СТАРТ ────────────────────────────────────────────────────
recalc();
draw();
</script>
</body>
</html>
